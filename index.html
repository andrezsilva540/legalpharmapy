    <script>
        function wmStore() {
            return {
                view: 'home',
                activeCategory: 'Todos',
                activeProduct: null,
                cart: [],
                products: [],
                
                categories: ["TIRZEPATIDA","RETATRUTIDE","PEPT\u00cdDEOS","ANAB\u00d3LICOS","OUTROS"],

                async init() {
                    if (window.location.protocol === 'file:' && Array.isArray(window.WM_PRODUCTS)) {
                        this.products = window.WM_PRODUCTS;
                        return;
                    }

                    try {
                        const response = await fetch('./products.json');
                        if (!response.ok) {
                            throw new Error(`Falha ao carregar products.json: ${response.status}`);
                        }

                        const data = await response.json();
                        this.products = Array.isArray(data) ? data : [];
                    } catch (error) {
                        console.error('Erro ao carregar produtos:', error);
                        this.products = Array.isArray(window.WM_PRODUCTS) ? window.WM_PRODUCTS : [];
                    }
                },

                setActiveCategory(category) {
                    this.view = 'home';
                    this.activeCategory = category === 'Todos' ? 'Todos' : (this.categories.includes(category) ? category : 'Todos');
                },

                isSelectedCategory(category) {
                    return this.activeCategory === category;
                },

                get visibleCategories() {
                    return this.activeCategory === 'Todos'
                        ? this.categories
                        : this.categories.filter(cat => cat === this.activeCategory);
                },

                get showFeedbacks() {
                    return this.activeCategory === 'Todos';
                },
                
                getProductsByCategory(cat) {
                    return this.products.filter(p => p.category === cat);
                },
                 
                get filteredProducts() {
                    if (this.activeCategory === 'Todos') return this.products;
                    return this.products.filter(p => p.category === this.activeCategory);
                },
                
                formatPrice(val) {
                    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
                },
                get cartTotal() {
                    return this.cart.reduce((s, i) => s + i.price, 0);
                },
                openProduct(p) { 
                    if (!(p.unavailable || false)) {
                        this.activeProduct = p;
                    }
                },
                addToCart(p) { this.cart.push(p); this.view = 'cart'; },
                removeFromCart(i) { this.cart.splice(i, 1); },
                checkoutWhatsApp() {
                    let msg = "*legalpharmapy - NOVO PEDIDO*\n\n";
                    this.cart.forEach(i => msg += `• ${i.name} (${this.formatPrice(i.price)})\n`);
                    msg += `\n*Total: ${this.formatPrice(this.cartTotal)}*`;
                    window.open(`https://wa.me/595985411795?text=${encodeURIComponent(msg)}`);
                },
                shareWhatsApp() {
                    if (navigator.share && navigator.canShare) { 
                        fetch(this.activeProduct.image)
                            .then(response => response.blob())
                            .then(blob => {
                                const file = new File([blob], 'product.jpg', { type: blob.type });
                                const shareData = {
                                    title: this.activeProduct.name,
                                    text: `${this.activeProduct.name} - ${this.formatPrice(this.activeProduct.price)}\n\n${this.activeProduct.description}\n\n🔥 legalpharmapy 🔥`,
                                    url: window.location.href,
                                    files: [file]
                                };
                                
                                if (navigator.canShare(shareData)) {
                                    navigator.share(shareData);
                                } else { 
                                    this.fallbackShare();
                                }
                            })
                            .catch(() => { 
                                this.fallbackShare();
                            });
                    } else {
                        this.fallbackShare();
                    }
                },
                fallbackShare() {
                    const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');
                    const fullImageUrl = this.activeProduct.image.startsWith('http') ? 
                        this.activeProduct.image : 
                        baseUrl + this.activeProduct.image;
                    
                    const text = `🛒 *${this.activeProduct.name}*\n\n💰 ${this.formatPrice(this.activeProduct.price)}\n\n📝 ${this.activeProduct.description}\n\n🔥 legalpharmapy - www.wmimports.com.py\n\n📱 ${baseUrl}`;
                    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
                },
                shareFacebook() {
                    const url = window.location.href;
                    const text = `${this.activeProduct.name} - legalpharmapy`;
                    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`);
                }, 
                copyLink() {
                    const url = window.location.href;
                    navigator.clipboard.writeText(url).then(() => {
                        // Show toast notification
                        const toast = document.createElement('div');
                        toast.className = 'fixed top-5 right-5 z-[110] p-4 rounded-2xl shadow-xl text-white font-black bg-emerald-500 animate__animated animate__fadeInDown';
                        toast.textContent = 'Link copiado!';
                        document.body.appendChild(toast);
                        
                        this.activeProduct = null;
                        
                        setTimeout(() => {
                            toast.classList.add('animate__fadeOutUp');
                            setTimeout(() => toast.remove(), 500);
                        }, 2000);
                    });
                }
            }
        }
    </script>
